swagger: '2.0'

info:
  title: notes-api
  description: Notes API
  version: 1.0.0

schemes:
- https

paths:

  /:
    get:
      operationId: getHome
      x-google-backend:
        address: https://YOUR_CLOUD_RUN_URL
      responses:
        '200':
          description: Home page

  /add:
    post:
      operationId: addNote
      x-google-backend:
        address: https://YOUR_CLOUD_RUN_URL
      responses:
        '200':
          description: Note added
